name: CI/CD to Heroku

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run build
        run: echo "Build successful"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy step
        run: echo "Deployed to Heroku"
